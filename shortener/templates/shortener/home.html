<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #1a5fa8; text-align: center; }
        input[type="url"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1a5fa8;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #154d8a; }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #1a5fa8;
        }
        .result a { color: #1a5fa8; word-break: break-all; }
    </style>
</head>
<body>
    <h1>URL Shortener</h1>
    
    <form method="POST">
        {% csrf_token %}
        <input 
            type="url" 
            name="url" 
            placeholder="https://example.com/your-long-url" 
            required
        >
        <button type="submit">Shorten URL</button>
    </form>

    {% if short_url %}
    <div class="result">
        <p><strong>Original:</strong> {{ original_url }}</p>
        <p><strong>Short URL:</strong> 
            <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
        </p>
    </div>
    {% endif %}
</body>
</html>
